<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ora & Samuel | 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;1,300&family=Montserrat:wght@100;300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --luxury-gold: #E3D4B6;
            --white-trans: rgba(255, 255, 255, 0.08);
            --glass-blur: blur(12px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            height: 100%;
            font-family: 'Montserrat', sans-serif;
            background-color: #000;
            overflow: hidden;
            color: #fff;
            transition: background-color 1.2s ease-in-out;
        }

        /* Quand on clique, le fond devient blanc */
        body.fade-to-white { background-color: #fff; }

        .bg-image {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: url('images/saut.jpg') no-repeat 10% center / cover;
            z-index: 1;
            opacity: 0.65;
            transition: all 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            animation: slowZoom 25s infinite alternate ease-in-out;
        }

        /* Animation de transition au clic */
        .bg-image.final-zoom {
            transform: scale(1.5);
            opacity: 0;
            filter: brightness(1.5);
        }

        @keyframes slowZoom {
            from { transform: scale(1.02); }
            to { transform: scale(1.12); }
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(0,0,0,0) 0%, rgba(0,0,0,0.3) 60%, rgba(0,0,0,0.8) 100%);
            z-index: 2;
            transition: opacity 1s ease;
        }
        body.fade-to-white .overlay { opacity: 0; }

        .main-container {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .main-container.exit-anim {
            opacity: 0;
            transform: scale(0.9);
            filter: blur(10px);
        }

        .welcome-txt {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: clamp(1rem, 4vw, 1.4rem);
            letter-spacing: 1px;
            margin-bottom: 15px;
            color: var(--luxury-gold);
            font-weight: 300;
        }

        .names {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(3.5rem, 14vw, 6.5rem);
            margin-bottom: 45px;
            font-weight: 300;
            font-style: italic;
            line-height: 1;
            background: linear-gradient(to bottom, #ffffff 30%, var(--luxury-gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .countdown-container { display: flex; gap: 15px; margin-bottom: 60px; }

        .countdown-box {
            width: clamp(75px, 20vw, 95px);
            height: clamp(85px, 22vw, 105px);
            background: var(--white-trans);
            backdrop-filter: var(--glass-blur);
            border: 1px solid rgba(227, 212, 182, 0.15);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .count-num { font-size: clamp(1.6rem, 5vw, 2.3rem); font-family: 'Cormorant Garamond', serif; }
        .count-label { font-size: 0.55rem; text-transform: uppercase; letter-spacing: 3px; color: var(--luxury-gold); }

        .enter-btn {
            background: transparent;
            border: 1px solid rgba(227, 212, 182, 0.4);
            padding: 20px 60px;
            color: #fff;
            text-decoration: none;
            letter-spacing: 6px;
            font-size: 0.75rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.6s;
            backdrop-filter: blur(5px);
        }

        .enter-btn:hover {
            background: rgba(227, 212, 182, 0.1);
            letter-spacing: 8px;
            border-color: var(--luxury-gold);
        }

    </style>
</head>
<body>

<div class="bg-image" id="bgImage"></div>
<div class="overlay"></div>

<div class="main-container" id="mainContent">
    <p class="welcome-txt">Nous avons le plaisir de vous convier au mariage de</p>
    <h1 class="names">Ora & Samuel</h1>

    <div class="countdown-container">
        <div class="countdown-box"><span class="count-num" id="days">00</span><span class="count-label">Jours</span></div>
        <div class="countdown-box"><span class="count-num" id="hours">00</span><span class="count-label">Heures</span></div>
        <div class="countdown-box"><span class="count-num" id="minutes">00</span><span class="count-label">Min</span></div>
        <div class="countdown-box"><span class="count-num" id="seconds">00</span><span class="count-label">Sec</span></div>
    </div>

    <a href="#" onclick="smoothTransition(event)" class="enter-btn">Découvrir</a>
</div>

<script>
    const weddingDate = new Date(2026, 4, 12, 17, 30, 0).getTime();

    function updateCountdown() {
        const diff = weddingDate - new Date().getTime();
        if (diff > 0) {
            document.getElementById('days').innerText = Math.floor(diff / 86400000);
            document.getElementById('hours').innerText = Math.floor((diff % 86400000) / 3600000);
            document.getElementById('minutes').innerText = Math.floor((diff % 3600000) / 60000);
            document.getElementById('seconds').innerText = Math.floor((diff % 60000) / 1000);
        }
    }
    setInterval(updateCountdown, 1000);
    updateCountdown();

    function smoothTransition(e) {
        e.preventDefault();

        // Appliquer les classes d'animation
        document.body.classList.add('fade-to-white');
        document.getElementById('mainContent').classList.add('exit-anim');
        document.getElementById('bgImage').classList.add('final-zoom');

        // Redirection après l'effet visuel
        setTimeout(() => {
            window.location.href = "invitation.html";
        }, 1200);
    }
</script>
</body>
</html>
