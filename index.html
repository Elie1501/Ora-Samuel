<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ora & Samuel | 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;1,300&family=Montserrat:wght@100;300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --luxury-gold: #E3D4B6;
            --white-trans: rgba(255, 255, 255, 0.08);
            --glass-blur: blur(12px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            height: 100%;
            font-family: 'Montserrat', sans-serif;
            background-color: #f4f1ea; /* Fond de destination (le papier marbré) */
            overflow: hidden;
            color: #fff;
            perspective: 2000px;
        }

        .book-cover {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 10;
            transform-origin: left center;
            transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 1s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #000;
        }

        body.page-turned .book-cover {
            transform: rotateY(-110deg);
            opacity: 0;
            pointer-events: none;
        }

        .bg-image {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: url('images/saut.jpg') no-repeat 10% center / cover;
            z-index: -1;
            opacity: 0.65;
            animation: slowZoom 25s infinite alternate ease-in-out;
        }

        @keyframes slowZoom {
            from { transform: scale(1.02); }
            to { transform: scale(1.12); }
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(0,0,0,0) 0%, rgba(0,0,0,0.3) 60%, rgba(0,0,0,0.8) 100%);
            z-index: 0;
        }

        .content-wrapper {
            position: relative;
            z-index: 11;
            text-align: center;
            padding: 20px;
        }

        .welcome-txt {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: clamp(1rem, 4vw, 1.4rem);
            letter-spacing: 1px;
            margin-bottom: 15px;
            color: var(--luxury-gold);
            font-weight: 300;
        }

        .names {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(3.5rem, 14vw, 6.5rem);
            margin-bottom: 45px;
            font-weight: 300;
            font-style: italic;
            line-height: 1;
            background: linear-gradient(to bottom, #ffffff 30%, var(--luxury-gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .countdown-container { display: flex; gap: 15px; margin-bottom: 60px; justify-content: center; }

        .countdown-box {
            width: clamp(75px, 20vw, 95px);
            height: clamp(85px, 22vw, 105px);
            background: var(--white-trans);
            backdrop-filter: var(--glass-blur);
            border: 1px solid rgba(227, 212, 182, 0.15);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .count-num { font-size: clamp(1.6rem, 5vw, 2.3rem); font-family: 'Cormorant Garamond', serif; }
        .count-label { font-size: 0.55rem; text-transform: uppercase; letter-spacing: 3px; color: var(--luxury-gold); }

        .enter-btn {
            background: transparent;
            border: 1px solid rgba(227, 212, 182, 0.4);
            padding: 20px 60px;
            color: #fff;
            text-decoration: none;
            letter-spacing: 6px;
            font-size: 0.75rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.6s;
            backdrop-filter: blur(5px);
        }

        .enter-btn:hover {
            background: rgba(227, 212, 182, 0.1);
            letter-spacing: 8px;
            border-color: var(--luxury-gold);
        }
    </style>
</head>
<body>

<div class="book-cover" id="bookCover">
    <div class="bg-image"></div>
    <div class="overlay"></div>

    <div class="content-wrapper">
        <p class="welcome-txt">Nous avons le plaisir de vous convier au mariage de</p>
        <h1 class="names">Ora & Samuel</h1>

        <div class="countdown-container">
            <div class="countdown-box"><span class="count-num" id="days">00</span><span class="count-label">Jours</span></div>
            <div class="countdown-box"><span class="count-num" id="hours">00</span><span class="count-label">Heures</span></div>
            <div class="countdown-box"><span class="count-num" id="minutes">00</span><span class="count-label">Min</span></div>
            <div class="countdown-box"><span class="count-num" id="seconds">00</span><span class="count-label">Sec</span></div>
        </div>

        <a href="#" onclick="turnPage(event)" class="enter-btn">Découvrir</a>
    </div>
</div>

<script>
    // Countdown ajusté au Dimanche 11 Octobre 2026 à 14h00
    // Rappel : Mois 9 = Octobre en JS
    const weddingDate = new Date(2026, 9, 11, 14, 0, 0).getTime();

    function updateCountdown() {
        const now = new Date().getTime();
        const diff = weddingDate - now;

        if (diff > 0) {
            document.getElementById('days').innerText = Math.floor(diff / 86400000).toString().padStart(2, '0');
            document.getElementById('hours').innerText = Math.floor((diff % 86400000) / 3600000).toString().padStart(2, '0');
            document.getElementById('minutes').innerText = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
            document.getElementById('seconds').innerText = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
        } else {
            // Si la date est passée
            document.getElementById('days').innerText = "00";
            document.getElementById('hours').innerText = "00";
            document.getElementById('minutes').innerText = "00";
            document.getElementById('seconds').innerText = "00";
        }
    }

    setInterval(updateCountdown, 1000);
    updateCountdown();

    function turnPage(e) {
        e.preventDefault();
        document.body.classList.add('page-turned');
        setTimeout(() => {
            window.location.href = "invitation.html";
        }, 1300);
    }
</script>
</body>
</html>
