<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ora & Samuel | 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;1,300&family=Montserrat:wght@100;300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --luxury-gold: #E3D4B6;
            --white-trans: rgba(255, 255, 255, 0.08);
            --glass-blur: blur(12px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            height: 100%;
            font-family: 'Montserrat', sans-serif;
            background-color: #000;
            overflow: hidden;
            color: #fff;
        }

        .bg-image {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: url('images/saut.jpg') no-repeat 10% center / cover;
            z-index: 1;
            opacity: 0.65;
            -webkit-transform-origin: left center;
            transform-origin: left center;
            animation: slowZoom 25s infinite alternate ease-in-out;
        }

        @keyframes slowZoom {
            from { transform: scale(1.02); }
            to { transform: scale(1.12); }
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center,
            rgba(0,0,0,0) 0%,
            rgba(0,0,0,0.3) 60%,
            rgba(0,0,0,0.8) 100%);
            z-index: 2;
        }

        .main-container {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .welcome-txt {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: clamp(1rem, 4vw, 1.4rem);
            letter-spacing: 1px;
            margin-bottom: 15px;
            color: var(--luxury-gold);
            font-weight: 300;
            opacity: 0.9;
        }

        .names {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(3.5rem, 14vw, 6.5rem);
            margin-bottom: 45px;
            font-weight: 300;
            font-style: italic;
            letter-spacing: -1px;
            line-height: 1;
            background: linear-gradient(to bottom, #ffffff 30%, var(--luxury-gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .countdown-container {
            display: flex;
            gap: 15px;
            margin-bottom: 60px;
        }

        .countdown-box {
            width: clamp(75px, 20vw, 95px);
            height: clamp(85px, 22vw, 105px);
            background: var(--white-trans);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid rgba(227, 212, 182, 0.15);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 2px;
            transition: all 0.5s ease;
        }

        .countdown-box:hover {
            border-color: var(--luxury-gold);
            transform: translateY(-5px);
        }

        .count-num {
            font-size: clamp(1.6rem, 5vw, 2.3rem);
            font-weight: 300;
            color: #fff;
            font-family: 'Cormorant Garamond', serif;
        }

        .count-label {
            font-size: 0.55rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-top: 8px;
            color: var(--luxury-gold);
            font-weight: 300;
        }

        .enter-btn {
            background: transparent;
            border: 1px solid rgba(227, 212, 182, 0.4);
            padding: 20px 60px;
            color: #fff;
            text-decoration: none;
            letter-spacing: 6px;
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 300;
            transition: all 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
            backdrop-filter: blur(5px);
        }

        .enter-btn:hover {
            background: rgba(227, 212, 182, 0.1);
            border-color: var(--luxury-gold);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
            letter-spacing: 8px;
        }

        @media (max-width: 480px) {
            .countdown-container { gap: 10px; }
            .names { margin-bottom: 35px; }
            .countdown-box { width: clamp(65px, 21vw, 85px); height: clamp(75px, 22vw, 95px); }
        }
    </style>
</head>
<body>

<div class="bg-image"></div>
<div class="overlay"></div>

<div class="main-container">
    <p class="welcome-txt">Nous avons le plaisir de vous convier au mariage de</p>
    <h1 class="names">Ora & Samuel</h1>

    <div class="countdown-container">
        <div class="countdown-box">
            <span class="count-num" id="days">00</span>
            <span class="count-label">Jours</span>
        </div>
        <div class="countdown-box">
            <span class="count-num" id="hours">00</span>
            <span class="count-label">Heures</span>
        </div>
        <div class="countdown-box">
            <span class="count-num" id="minutes">00</span>
            <span class="count-label">Min</span>
        </div>
        <div class="countdown-box">
            <span class="count-num" id="seconds">00</span>
            <span class="count-label">Sec</span>
        </div>
    </div>

    <a href="invitation.html" class="enter-btn">Découvrir</a>
</div>

<script>
    const weddingDate = new Date(2026, 5, 14, 17, 0, 0).getTime();

    function updateCountdown() {
        const now = new Date().getTime();
        const diff = weddingDate - now;

        if (diff > 0) {
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById('days').innerText = String(d).padStart(2, '0');
            document.getElementById('hours').innerText = String(h).padStart(2, '0');
            document.getElementById('minutes').innerText = String(m).padStart(2, '0');
            document.getElementById('seconds').innerText = String(s).padStart(2, '0');
        } else {
            document.querySelector('.countdown-container').innerHTML =
                "<p style='font-size:1.5rem; color:var(--luxury-gold); font-family:\"Cormorant Garamond\", serif; font-style: italic;'>C'est le grand jour !</p>";
        }
    }

    setInterval(updateCountdown, 1000);
    updateCountdown();
</script>
</body>
</html>
